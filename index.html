<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晨間感恩與心靈語錄</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background-color: #fdfcf0;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
            line-height: 1.8;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid #d4a373;
        }
        h2 {
            color: #d4a373;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .gratitude-list {
            list-style: none;
            padding: 0;
            margin-bottom: 40px;
        }
        .gratitude-list li {
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: baseline;
        }
        .gratitude-list li::before {
            content: "✨";
            margin-right: 10px;
        }
        .quotes {
            background-color: #f9f9f9;
            padding: 25px;
            border-radius: 10px;
            font-style: italic;
            color: #555;
        }
        .quotes p {
            margin-bottom: 15px;
            position: relative;
        }
        .highlight {
            font-size: 1.5rem;
            font-weight: bold;
            color: #bc6c25;
            text-align: center;
            margin-top: 30px;
            display: block;
        }
        hr {
            border: none;
            border-top: 1px dashed #ccc;
            margin: 30px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>每天早上：</h2>
    <ul class="gratitude-list">
        <li>感恩財富由四面八方而來</li>
        <li>感恩我的身體一天比一天更有活力</li>
        <li>感恩我的事業非常順利</li>
        <li>感恩我的家庭幸福美滿</li>
        <li>感恩我的子女健康聰慧</li>
        <li>感恩我生命中遇到的所有貴人</li>
    </ul>

    <hr>

    <div class="quotes">
        <p>多念別人的好，常修自己的心。</p>
        <p>世間所有福德，都是您日積月累的善良與感恩。</p>
        <p>樹若千丈不忘根，人若風光需感恩。</p>
        <p>生命是一種回聲，常念別人的好，所有的溫柔都會回饋到自己身上。</p>
        <p>您一定會越來越好。</p>
    </div>

    <span class="highlight">我很好！</span>
</div>

</body>
</html>
